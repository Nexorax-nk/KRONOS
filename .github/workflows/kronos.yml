name: KRONOS Institutional Memory

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  kronos-triage:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened')
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install KRONOS Core
        run: pip install ./kronos-cli

      - name: 🧠 KRONOS Active Review
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Running 5-Layer Analysis on PR #$PR_NUMBER..."
          # In a real environment, the CLI would fetch the diff via PyGithub.
          # We run the validation first to ensure memory integrity.
          kronos validate --path .kronos
          
          # This command represents the execution of the MR Review Agent
          # In a live setup, it posts the comment directly to the PR.
          kronos review-pr --repo $REPO --pr $PR_NUMBER --fail-on-conflict

          
          echo "✅ Analysis complete. Comment posted to PR."

  kronos-post-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install KRONOS Core
        run: pip install ./kronos-cli

      - name: 🧠 KRONOS Post-Merge Decision Extraction
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Extracting decisions from PR #$PR_NUMBER..."
          kronos extract-pr --repo $REPO --pr $PR_NUMBER --path .kronos

  kronos-reply-handler:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, 'kronos:')
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install KRONOS Core
        run: pip install ./kronos-cli

      - name: 🧠 KRONOS Reply Parse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "Processing command: $COMMENT_BODY..."
          kronos handle-reply --repo $REPO --pr $PR_NUMBER --comment "$COMMENT_BODY" --path .kronos
